<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link rel="manifest" id="pwa-manifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #F5F1EB;
  --surface:    #F5F1EB;
  --card:       #EDE8E0;
  --ink:        #1A1A18;
  --ink-2:      #6B6459;
  --ink-3:      #6B6459;
  --ink-4:      #D6CFC4;
  --border:     #D6CFC4;
  --border-2:   #D6CFC4;
  --accent:     #8B6F52;
  --nav-h:      52px;
  --serif:      'Noto Serif TC', serif;
  --sans:       'Noto Sans TC', sans-serif;

  --success: #6e8c6a; --success-bg: #eef4ec; --success-b: #b8d4b4;
  --fail:    #a06050; --fail-bg:    #f6edea; --fail-b:    #d8bab4;
  --pending: #a08848; --pending-bg: #f5f0e4; --pending-b: #d8cca0;
  --progress:#607898; --progress-bg:#edf0f6; --progress-b:#b4c0d4;
  --order:   #806888; --order-bg:   #f2edf5; --order-b:   #c8b8d0;

  --c-base:      #7f2d00;
  --c-botanical: #a19a49;
  --c-resin:     #c07141;
  --c-tincture:  #478675;
  --c-ferment:   #955254;
  --c-wine:      #d8d8d8;
  --c-binder:    #d3b385;

  --cat-shrine:  #9a7a70;
  --cat-improve: #a08860;
  --cat-green:   #587868;
  --cat-wood:    #7a5a3a;
  --cat-floral:  #8c6878;
  --cat-resin:   #7a6a38;
  --cat-western: #586478;
  --cat-special: #5a7068;
  --cat-tincture:#406080;
  --cat-test:    #686060;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 15px; color-scheme: light; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-weight: 300;
  line-height: 1.75;
  min-height: 100vh;
}

/* ── TOP NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.nav-primary {
  height: var(--nav-h);
  display: flex; align-items: center;
  padding: 0 24px;
  max-width: 960px; margin: 0 auto;
  gap: 0;
}
.nav-brand {
  font-family: var(--serif); font-size: 16px; font-weight: 400;
  letter-spacing: 0.2em; color: var(--ink); flex-shrink: 0;
  margin-right: auto;
}
.nav-tabs {
  display: flex; align-items: stretch; height: var(--nav-h);
}
.nav-tab {
  padding: 0 20px; border: none; background: none; cursor: pointer;
  font-family: var(--sans); font-weight: 300; font-size: 12px;
  letter-spacing: 0.15em; color: var(--ink-3);
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.active { color: var(--ink); border-bottom-color: var(--ink); }
.nav-new-btn {
  margin-left: 16px; padding: 0 16px; height: 32px; align-self: center;
  background: transparent; border: 1px solid var(--border);
  font-family: var(--sans); font-weight: 300; font-size: 12px;
  letter-spacing: 0.12em; color: var(--ink-2); cursor: pointer;
  transition: border-color 0.2s, color 0.2s; flex-shrink: 0;
}
.nav-new-btn:hover { border-color: var(--ink); color: var(--ink); }

/* ── NAV MENU (收合選單) ── */
.nav-menu-wrap { position: relative; align-self: center; margin-left: 8px; flex-shrink: 0; }
.nav-menu-btn {
  width: 36px; height: 32px; display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid var(--border);
  cursor: pointer; color: var(--ink-2); font-size: 16px; letter-spacing: 0.05em;
  transition: border-color 0.2s, color 0.2s;
}
.nav-menu-btn:hover { border-color: var(--ink); color: var(--ink); }
.nav-dropdown {
  display: none; position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--surface); border: 1px solid var(--border);
  min-width: 120px; z-index: 200;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.nav-dropdown.open { display: block; }
.nav-dropdown-item {
  display: block; width: 100%; padding: 11px 18px;
  background: none; border: none; border-bottom: 1px solid var(--border);
  text-align: left; cursor: pointer;
  font-family: var(--sans); font-weight: 300; font-size: 13px;
  color: var(--ink-2); letter-spacing: 0.1em;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.nav-dropdown-item:last-child { border-bottom: none; }
.nav-dropdown-item:hover { background: var(--card); color: var(--ink); }

/* ── NOTES TAB ── */
.note-mic-btn {
  flex: 1; height: 44px;
  border: 1px solid var(--border); background: transparent;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  cursor: pointer; font-size: 12px; letter-spacing: 0.12em;
  color: var(--ink-2); font-family: var(--sans); font-weight: 300;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.note-mic-btn:hover { border-color: var(--ink); color: var(--ink); }
.note-mic-btn.recording {
  border-color: #a05040; color: #a05040; background: #fdf5f3;
  animation: note-pulse 1.2s ease-in-out infinite;
}
@keyframes note-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(160,80,64,0.2); }
  50% { box-shadow: 0 0 0 6px rgba(160,80,64,0); }
}
.note-textarea {
  width: 100%; min-height: 110px; border: 1px solid var(--border);
  background: var(--card); padding: 12px 14px; resize: none; outline: none;
  font-family: var(--sans); font-weight: 300; font-size: 14px;
  color: var(--ink); line-height: 1.75; display: block;
  transition: border-color 0.15s;
}
.note-textarea:focus { border-color: var(--ink-3); }
.note-save-btn {
  flex: 2; height: 44px; padding: 0 16px;
  background: var(--ink); color: var(--bg); border: none;
  font-family: var(--sans); font-weight: 300; font-size: 12px;
  letter-spacing: 0.18em; cursor: pointer; transition: background 0.15s;
}
.note-save-btn:hover { background: var(--accent); }
.note-card { border: 1px solid var(--border); background: var(--card); margin-bottom: 10px; }
.note-card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 14px; border-bottom: 1px solid var(--border);
}
.note-card-time { font-size: 11px; color: var(--ink-4); letter-spacing: 0.1em; }
.note-card-del {
  background: none; border: none; font-size: 16px; color: var(--ink-4);
  cursor: pointer; padding: 0 4px; line-height: 1;
}
.note-card-body {
  padding: 12px 14px; font-size: 14px; color: var(--ink);
  font-family: var(--sans); font-weight: 300; line-height: 1.75;
  white-space: pre-wrap; word-break: break-all;
}
.note-card-footer { padding: 8px 14px; border-top: 1px solid var(--border); }
.note-parse-btn {
  width: 100%; padding: 9px; background: transparent;
  border: 1px solid var(--accent); color: var(--accent);
  font-family: var(--sans); font-weight: 300; font-size: 11px;
  letter-spacing: 0.15em; cursor: pointer; transition: all 0.15s;
}
.note-parse-btn:hover { background: var(--accent); color: var(--bg); }
.note-parse-btn:disabled { border-color: var(--ink-4); color: var(--ink-4); cursor: not-allowed; background: transparent; }
.note-parse-result {
  margin: 0 14px 12px; border: 1px solid var(--border);
  background: var(--surface); padding: 12px 14px;
}
.note-apikey-wrap {
  border: 1px solid var(--border); background: var(--surface); padding: 14px; margin-bottom: 16px;
}
.note-apikey-input {
  width: 100%; border: 1px solid var(--border); background: var(--bg);
  padding: 9px 12px; font-family: var(--sans); font-weight: 300;
  font-size: 13px; color: var(--ink); outline: none; margin-bottom: 8px;
}
.note-apikey-save {
  width: 100%; padding: 9px; background: var(--ink); color: var(--bg);
  border: none; font-family: var(--sans); font-weight: 300;
  font-size: 11px; letter-spacing: 0.15em; cursor: pointer;
}

/* home 搜尋列 + NEW 同行 */
.home-toolbar { display: flex; gap: 8px; align-items: stretch; margin-bottom: 20px; }
.home-toolbar .home-search { flex: 1; margin-bottom: 0; }
.home-new-btn {
  flex-shrink: 0; padding: 0 16px; height: 44px;
  background: var(--ink); border: none;
  font-family: var(--sans); font-weight: 300; font-size: 12px;
  letter-spacing: 0.12em; color: var(--bg); cursor: pointer;
  transition: background 0.2s; white-space: nowrap;
}
.home-new-btn:hover { background: var(--accent); }

/* sub-bar: 顯示於 category / detail / form 頁 */
.nav-sub-bar {
  display: none;
  height: 44px;
  border-top: 1px solid var(--border);
  align-items: center;
  padding: 0 24px; gap: 12px;
  max-width: 960px; margin: 0 auto;
}
#nav-back {
  display: none; width: 32px; height: 32px;
  border: none; background: none; cursor: pointer;
  font-size: 16px; color: var(--ink-2);
  align-items: center; justify-content: center;
  transition: color 0.2s; flex-shrink: 0;
}
#nav-back:hover { color: var(--ink); }
#nav-sub-title {
  flex: 1; font-family: var(--serif); font-size: 15px; font-weight: 400;
  letter-spacing: 0.06em; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#nav-sub-action {
  flex-shrink: 0; padding: 0 16px; height: 30px;
  border: 1px solid var(--border); background: transparent;
  font-family: var(--sans); font-weight: 300; font-size: 12px;
  letter-spacing: 0.1em; color: var(--ink-2); cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
#nav-sub-action:hover { border-color: var(--ink); color: var(--ink); }
.nav-sub-save {
  background: var(--ink) !important; color: var(--bg) !important;
  border-color: var(--ink) !important;
}
.nav-sub-save:hover { background: var(--accent) !important; border-color: var(--accent) !important; }

/* ── MAIN ── */
main { padding-top: var(--nav-h); min-height: 100vh; padding-bottom: 20px; }
.container { max-width: 960px; margin: 0 auto; padding: 28px 16px 60px; }

/* ── HOME SEARCH (top of container) ── */
.home-search {
  display: flex; align-items: center;
  border: 1px solid var(--border);
  background: var(--bg); overflow: hidden; height: 44px;
  max-width: 100%;
}
.home-search input {
  flex: 1; padding: 0 14px; border: none; background: none;
  font-size: 14px; font-family: var(--sans); font-weight: 300;
  color: var(--ink); outline: none; height: 100%;
}
.home-search input::placeholder { color: var(--ink-4); }
.home-search:focus-within { border-color: var(--ink); }
.home-search-icon {
  padding: 0 14px; color: var(--ink-3); font-size: 16px; flex-shrink: 0;
  display: flex; align-items: center; height: 100%;
  border-right: 1px solid var(--border); user-select: none;
}

/* ── CAT GRID ── */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media (max-width: 500px) { .cat-grid { grid-template-columns: 1fr; gap: 8px; } }

.cat-card {
  background: var(--card);
  border: 1px solid var(--border);
  overflow: hidden; cursor: grab;
  display: flex; flex-direction: row;
  transition: border-color 0.2s, transform 0.15s;
  min-height: 160px;
  user-select: none;
}
.cat-card:hover { border-color: var(--accent); }
.cat-img-wrap {
  position: relative; flex-shrink: 0;
  width: 90px; height: 160px;
  overflow: hidden; background: var(--bg);
}
@media (min-width: 600px) { .cat-img-wrap { width: 100px; height: 180px; } }
.cat-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cat-img-placeholder {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px;
}
.cat-img-placeholder .ph-icon { font-size: 20px; opacity: 0.2; font-family: var(--serif); }
.cat-img-placeholder .ph-text { font-size: 8px; color: var(--ink-4); letter-spacing: 0.12em; }
.cat-img-upload-btn {
  position: absolute; bottom: 8px; right: 8px;
  width: 22px; height: 22px;
  background: var(--bg); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 11px;
  opacity: 0; transition: opacity 0.2s;
}
.cat-card:hover .cat-img-upload-btn { opacity: 1; }
.cat-info {
  flex: 1; padding: 14px 16px;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; justify-content: center; gap: 4px; min-width: 0;
}
.cat-name {
  font-family: var(--serif); font-size: 17px; font-weight: 400;
  letter-spacing: 0.06em; color: var(--ink);
}
.cat-sub { font-size: 12px; color: var(--ink-2); letter-spacing: 0.04em; }
.cat-count { font-size: 11px; color: var(--ink-2); letter-spacing: 0.1em; margin-top: 6px; }
.cat-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; flex-shrink: 0; }

.ornament { text-align: center; color: var(--border); letter-spacing: 0.3em; font-size: 12px; margin: 4px 0 16px; }

/* ── RECIPE LIST ── */
.recipe-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.recipe-row {
  background: var(--card); border: 1px solid var(--border);
  padding: 16px 18px; cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: border-color 0.2s; color: inherit;
}
.recipe-row:hover { border-color: var(--accent); }
.recipe-row-left { flex: 1; min-width: 0; }
.recipe-num { font-size: 11px; color: var(--ink-4); letter-spacing: 0.12em; margin-bottom: 4px; }
.recipe-name-sm {
  font-family: var(--serif); font-size: 16px; font-weight: 400;
  letter-spacing: 0.05em; color: var(--ink); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.recipe-row-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.recipe-row-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.recipe-comment-sm {
  font-size: 13px; color: var(--ink-3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;
}
@media (max-width: 500px) { .recipe-comment-sm { display: none; } }

/* ── STATUS BADGE ── */
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; padding: 2px 8px;
  letter-spacing: 0.08em; border: 1px solid; flex-shrink: 0;
  font-family: var(--sans); font-weight: 300;
}
.b-success { color: var(--success); background: var(--success-bg); border-color: var(--success-b); }
.b-fail    { color: var(--fail);    background: var(--fail-bg);    border-color: var(--fail-b); }
.b-pending { color: var(--pending); background: var(--pending-bg); border-color: var(--pending-b); }
.b-progress{ color: var(--progress);background: var(--progress-bg);border-color: var(--progress-b); }
.b-order   { color: var(--order);   background: var(--order-bg);   border-color: var(--order-b); }

/* ── STARS ── */
.stars { display: inline-flex; gap: 2px; }
.star { font-size: 13px; color: var(--ink-4); line-height: 1; }
.star.on { color: var(--accent); }

/* ── PROCESS PILL ── */
.pill { font-size: 11px; padding: 2px 8px; border: 1px solid; letter-spacing: 0.08em; font-family: var(--sans); font-weight: 300; }
.pill-t { color: #406080; background: #e8f0f8; border-color: #b0c8dc; }
.pill-f { color: #604878; background: #f0eaf6; border-color: #c4a8d4; }
.pill-w { color: #703a50; background: #f5eaee; border-color: #d4a8b4; }

/* ── TAGS ── */
.tag-sm { font-size: 11px; padding: 2px 8px; border: 1px solid var(--border); color: var(--ink-3); background: transparent; letter-spacing: 0.08em; font-family: var(--sans); font-weight: 300; }

/* ── DETAIL VIEW ── */
.detail-wrap { max-width: 680px; margin: 0 auto; padding: 24px 16px 60px; }
.detail-hero { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
.detail-num { font-size: 11px; color: var(--ink-4); letter-spacing: 0.15em; margin-bottom: 8px; }
.detail-name { font-family: var(--serif); font-size: 24px; font-weight: 400; letter-spacing: 0.1em; color: var(--ink); line-height: 1.4; margin-bottom: 14px; }
.detail-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }

.section-card { background: var(--card); border: 1px solid var(--border); padding: 20px 24px; margin-bottom: 10px; }
.section-lbl { font-size: 11px; letter-spacing: 0.2em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

/* version tabs */
.ver-tabs { display: flex; gap: 0; margin-bottom: 14px; }
.ver-tab {
  padding: 8px 18px; font-size: 12px; cursor: pointer;
  border: 1px solid var(--border); background: transparent;
  color: var(--ink-2); font-family: var(--sans); font-weight: 300;
  letter-spacing: 0.08em; transition: all 0.2s; margin-right: -1px;
}
.ver-tab:hover { border-color: var(--ink); color: var(--ink); }
.ver-tab.on { background: var(--ink); color: var(--bg); border-color: var(--ink); z-index: 1; position: relative; }

/* ingredient groups */
.ing-group { margin-bottom: 16px; }
.ing-group-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.ing-group-label span { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.ing-group-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.ing-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--bg); font-size: 14px; }
.ing-item:last-child { border-bottom: none; }
.ing-name { color: var(--ink); font-weight: 300; }
.ing-right { display: flex; align-items: center; gap: 8px; color: var(--ink-2); }
.ing-pct { font-size: 12px; color: var(--ink-4); min-width: 38px; text-align: right; }

/* proportion bar — 加粗 */
.prop-bar { height: 6px; overflow: hidden; display: flex; margin-bottom: 12px; }
.prop-seg { height: 100%; }
.prop-legend { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-bottom: 14px; }
.prop-li { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--ink-2); }
.prop-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* timeline */
.tl-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; font-size: 13px; }
.tl-label { font-size: 11px; color: var(--ink-3); letter-spacing: 0.1em; min-width: 44px; }
.tl-val { color: var(--ink); font-family: var(--serif); }
.tl-status { display: inline-block; font-size: 12px; padding: 4px 12px; margin-top: 4px; letter-spacing: 0.06em; border: 1px solid; }
.tl-active  { background: var(--success-bg); color: var(--success); border-color: var(--success-b); }
.tl-waiting { background: var(--pending-bg); color: var(--pending); border-color: var(--pending-b); }
.tl-done    { background: transparent; color: var(--ink-3); border-color: var(--border); }

/* process */
.proc-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.proc-note { font-size: 12px; color: var(--ink-2); margin-top: 8px; font-family: var(--serif); font-style: italic; }

/* comments */
.cmt-item { display: flex; gap: 12px; margin-bottom: 14px; }
.cmt-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--ink-2); font-family: var(--serif); flex-shrink: 0; }
.cmt-tester { font-size: 12px; color: var(--ink-3); margin-bottom: 3px; letter-spacing: 0.06em; }
.cmt-text { font-size: 14px; color: var(--ink); font-family: var(--serif); line-height: 1.75; }

/* claude button */
.claude-btn { width: 100%; margin-top: 12px; padding: 14px 20px; background: transparent; border: 1px solid var(--border); cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: var(--sans); font-size: 12px; color: var(--ink-3); letter-spacing: 0.1em; transition: border-color 0.2s, color 0.2s; }
.claude-btn:hover { border-color: var(--accent); color: var(--accent); }
.claude-btn-icon { font-size: 14px; }

/* ── FORM ── */
.form-wrap { max-width: 680px; margin: 0 auto; padding: 16px 16px 60px; }
.form-card { background: var(--card); border: 1px solid var(--border); padding: 20px 24px; margin-bottom: 10px; }
.form-lbl { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); display: block; margin-bottom: 6px; }
.fi { width: 100%; padding: 10px 14px; border: 1px solid var(--border); background: var(--bg); font-size: 13px; font-family: var(--sans); font-weight: 300; color: var(--ink); outline: none; transition: border-color 0.2s; }
.fi:focus { border-color: var(--ink); }
select.fi { cursor: pointer; }
textarea.fi { resize: vertical; min-height: 68px; line-height: 1.75; }
.form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 500px) { .form-grid2 { grid-template-columns: 1fr; } }
.form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.form-group:last-child { margin-bottom: 0; }
.tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.tag-rm { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 8px; border: 1px solid var(--border); background: transparent; color: var(--ink-2); letter-spacing: 0.06em; }
.tag-x { cursor: pointer; color: var(--ink-4); font-size: 14px; line-height: 1; }
.tag-x:hover { color: var(--fail); }
.ing-form-row { display: grid; grid-template-columns: 1fr 62px 46px 24px; gap: 5px; margin-bottom: 5px; align-items: center; }
@media (max-width: 500px) { .ing-form-row { grid-template-columns: 1fr 55px 42px 24px; } }
.cat-sel { grid-column: 1 / -1; }
.cat-sel select { font-size: 11px; padding: 4px 8px; }
.rm-btn { width: 24px; height: 24px; border: none; background: none; cursor: pointer; color: var(--ink-4); font-size: 17px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
.rm-btn:hover { color: var(--fail); }
.add-row-btn { width: 100%; padding: 8px; border: 1px dashed var(--border); background: none; cursor: pointer; font-size: 11px; color: var(--ink-3); font-family: var(--sans); font-weight: 300; letter-spacing: 0.1em; transition: border-color 0.2s, color 0.2s; margin-top: 4px; }
.add-row-btn:hover { border-color: var(--ink); color: var(--ink); }
.proc-check-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
.proc-chk { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 6px 14px; border: 1px solid var(--border); background: transparent; cursor: pointer; transition: all 0.2s; color: var(--ink-2); letter-spacing: 0.06em; }
.proc-chk:hover { border-color: var(--ink); }
.proc-chk.chk-t { border-color: #7aaBcc; background: #e8f0f8; color: #406080; }
.proc-chk.chk-f { border-color: #b090cc; background: #f0eaf6; color: #604878; }
.proc-chk.chk-w { border-color: #cc9090; background: #f5eaee; color: #703a50; }
.star-edit { font-size: 20px; cursor: pointer; color: var(--ink-4); transition: color 0.15s; }
.star-edit.on { color: var(--accent); }
.stars-edit { display: inline-flex; gap: 3px; }
.preset-row { display: flex; gap: 0; }
.preset-btn { padding: 8px 16px; font-size: 12px; border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--ink-2); font-family: var(--sans); font-weight: 300; transition: all 0.2s; letter-spacing: 0.06em; margin-right: -1px; }
.preset-btn:hover { border-color: var(--ink); color: var(--ink); }
.preset-btn.on { background: var(--ink); color: var(--bg); border-color: var(--ink); z-index: 1; position: relative; }
.ver-tabs-form { display: flex; gap: 0; flex-wrap: wrap; margin-bottom: 12px; }

/* ── EMPTY ── */
.empty { text-align: left; padding: 48px 0; color: var(--ink-3); font-family: var(--serif); font-size: 15px; letter-spacing: 0.08em; }
.empty-sub { font-size: 11px; margin-top: 6px; color: var(--ink-4); font-family: var(--sans); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); }

/* ── MATERIALS ── */
.mat-header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
.mat-title { font-family: var(--serif); font-size: 22px; font-weight: 400; letter-spacing: 0.12em; color: var(--ink); }
.mat-total { font-size: 12px; color: var(--ink-3); letter-spacing: 0.06em; }
.mat-cat-scroll { display: flex; gap: 0; overflow-x: auto; margin-bottom: 24px; border: 1px solid var(--border); background: var(--card); -webkit-overflow-scrolling: touch; }
.mat-cat-scroll::-webkit-scrollbar { display: none; }
.mat-cat-btn { flex-shrink: 0; padding: 10px 16px; font-size: 12px; cursor: pointer; border: none; border-right: 1px solid var(--border); background: transparent; color: var(--ink-3); font-family: var(--sans); font-weight: 300; letter-spacing: 0.08em; white-space: nowrap; transition: all 0.2s; position: relative; }
.mat-cat-btn:last-child { border-right: none; }
.mat-cat-btn:hover { background: var(--bg); color: var(--ink); }
.mat-cat-btn.on { color: var(--ink); background: var(--bg); }
.mat-cat-btn.on::after { content: ''; position: absolute; bottom: 0; left: 12px; right: 12px; height: 2px; background: var(--accent); }

.mat-accent { width: 5px; flex-shrink: 0; }

.mat-card-name { font-family: var(--serif); font-size: 15px; font-weight: 400; color: var(--ink); letter-spacing: 0.04em; margin-bottom: 5px; }

.mat-card-meta span { font-size: 12px; color: var(--ink-3); }
.mat-card-note { font-size: 12px; color: var(--ink-2); line-height: 1.6; }
.mat-card-right { padding: 14px 14px; display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; gap: 8px; flex-shrink: 0; }
.mat-si { width: 58px; padding: 6px 8px; border: 1px solid var(--border); background: var(--bg); font-size: 13px; font-family: var(--sans); font-weight: 300; color: var(--ink); outline: none; text-align: right; transition: border-color 0.2s; }

.mat-stock-wrap { display: flex; align-items: center; width: 100%; }
.mat-stock-label { font-size: 11px; color: var(--ink-4); letter-spacing: 0.08em; }
.mat-stock-empty { font-size: 12px; color: var(--ink-4); letter-spacing: 0.06em; }
.mat-note-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0 6px; }
.mat-del { width: 26px; height: 26px; border: none; background: none; cursor: pointer; color: var(--ink-4); font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }

.mat-fi { width: 100%; padding: 9px 12px; border: 1px solid var(--border); background: var(--bg); font-size: 13px; font-family: var(--sans); font-weight: 300; color: var(--ink); outline: none; transition: border-color 0.2s; }

.mat-cancel-btn { padding: 9px 18px; background: transparent; color: var(--ink-3); border: 1px solid var(--border); cursor: pointer; font-size: 13px; font-family: var(--sans); font-weight: 300; transition: border-color 0.2s, color 0.2s; }
.mat-cancel-btn:hover { border-color: var(--ink); color: var(--ink); }

/* bottom nav — hidden, replaced by top tabs */
.bottom-nav { display: none; }

.cat-section-lbl { font-size: 10px; letter-spacing: 0.2em; color: var(--ink-4); text-transform: uppercase; margin-bottom: 10px; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.container, .detail-wrap, .form-wrap { animation: fadeUp 0.25s ease both; }

function getDocRef(path) {

function save() {
  const ref = getDocRef('config');
  if (!ref) return;
  ref.set({
    recipes: S.recipes,
    nextId: S.nextId,
    catOrder: S.catOrder || null,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(e => console.error('save config err:', e));
}

function saveCatImages() {
  const ref = getDocRef('catImages');
  if (!ref) return;
  ref.set({
    items: S.catImages || {},
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(e => console.error('save catImages err:', e));
}

async function loadFromFirestore() {
  try {
    const configSnap = await getDocRef('config').get();
    if (configSnap.exists) {
      const d = configSnap.data();
      S.recipes = d.recipes || makeSeed();
      S.nextId = d.nextId || 200;
      S.catOrder = d.catOrder || null;
      // catImages 已移至獨立文件，但若舊資料還在 config 就遷移
      const legacyCatImages = d.catImages || null;

      const catImgSnap = await getDocRef('catImages').get();
      if (catImgSnap.exists) {
        S.catImages = catImgSnap.data().items || {};
      } else if (legacyCatImages && Object.keys(legacyCatImages).length > 0) {
        // 遷移：從 config 搬到獨立文件
        S.catImages = legacyCatImages;
        saveCatImages();
      } else {
        S.catImages = {};
      }
    } else {
      // 首次使用：寫入種子資料
      S.recipes = makeSeed();
      S.nextId = 200;
      S.catImages = {};
      S.catOrder = null;
      save();
    }
    const matSnap = await getDocRef('materials').get();
    if (matSnap.exists) {
      const rawMats = matSnap.data().items || makeMaterialsSeed();
      // migration: herb → botanical
      rawMats.forEach(m=>{
        if(m.cat==='herb') m.cat='botanical';
        // migration: stock 字串 → 結構
        if (typeof m.stock !== 'object' || m.stock === null) {
          m.stock = {qty:0, unit:'g', note: typeof m.stock==='string' ? m.stock : ''};
        }
      });
      S._materials = rawMats;
    } else {
      S._materials = makeMaterialsSeed();
      saveMaterials(S._materials);
    }
    const notesSnap = await getDocRef('notes').get();
    S._notes = notesSnap.exists ? (notesSnap.data().items || []) : [];
  } catch(e) {
    console.error('loadFromFirestore err:', e);
    S.recipes = makeSeed();
    S._materials = makeMaterialsSeed();
    S._notes = [];
  }
}

function setupRealtimeSync() {
  const u = auth.currentUser;
  if (!u) return;
  // 監聽 config 變更（其他裝置修改時同步）
  db.collection('appData').doc(u.uid).collection('store').doc('config')
    .onSnapshot(snap => {
      if (!snap.exists || !snap.metadata.hasPendingWrites) return;
    }, err => console.error('sync err:', err));
}

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function badge(status) {
  const st = STATUS[status]||STATUS.progress;
  return `<span class="badge ${st.cls}">${st.icon} ${st.label}</span>`;
}

function renderStars(n, edit=false) {
  if (edit) return `<div class="stars-edit" id="se">${[1,2,3,4,5].map(i=>`<span class="star-edit${i<=n?' on':''}" data-v="${i}">✶</span>`).join('')}</div>`;
  return `<span class="stars">${[1,2,3,4,5].map(i=>`<span class="star${i<=n?' on':''}">✶</span>`).join('')}</span>`;
}

function processPills(p) {
  const out=[];
  if(p.tincture) out.push(`<span class="pill pill-t">✦ 酊劑</span>`);
  if(p.ferment)  out.push(`<span class="pill pill-f">✦ 酒酵法</span>`);
  if(p.wine)     out.push(`<span class="pill pill-w">✦ 泡酒香粉</span>`);
  return out.join('');
}

function propBar(ings) {
  const gs = ings.filter(i=>i.unit==='g'||i.unit==='%');
  const tot = gs.reduce((s,i)=>s+i.amount,0); if(!tot) return '';
  const segs = gs.map(i=>`<div class="prop-seg" style="width:${(i.amount/tot*100).toFixed(1)}%;background:${(ING_CATS[i.cat]||{color:'#888'}).color};" title="${i.name}"></div>`).join('');
  const catTots={};
  gs.forEach(i=>{if(!catTots[i.cat])catTots[i.cat]=0;catTots[i.cat]+=i.amount;});
  const legend = ING_CAT_ORDER.filter(c=>catTots[c]).map(c=>{
    const ic=ING_CATS[c]||{label:c,color:'#888'};
    return `<span class="prop-li"><span class="prop-dot" style="background:${ic.color}"></span>${ic.label} ${Math.round(catTots[c]/tot*100)}%</span>`;
  }).join('');
  return `<div class="prop-bar" style="margin-bottom:8px;">${segs}</div><div class="prop-legend" style="margin-bottom:14px;">${legend}</div>`;
}

function tlStatus(r) {
  const t = r.timeline; if(!t||!t.makeDate) return '';
  const make = new Date(t.makeDate);
  const dryEnd = new Date(make.getTime() + (t.dryDays||5)*86400000);
  const now = new Date();
  const fmt = d=>`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  if(now < dryEnd) {
    const d = Math.ceil((dryEnd-now)/86400000);
    return `<span class="tl-status tl-active">陰乾中・剩 ${d} 天（至 ${fmt(dryEnd)}）</span>`;
  }
  if(!t.agingStart) return `<span class="tl-status tl-waiting">陰乾完成・可入窖藏</span>`;
  const aging = new Date(t.agingStart);
  const days = Math.floor((now-aging)/86400000);
  return `<span class="tl-status tl-done">窖藏中・第 ${days} 天</span>`;
}

function getVI(r) { return Math.min(S.vi[r.id]||0, r.versions.length-1); }

function claudeURL(r) {
  const v = r.versions[getVI(r)];
  const msg = `我想討論一支製香配方的問題：

配方名稱：${r.name}（第 ${r.num} 號）
狀態：${STATUS[r.status]?.label||r.status}｜評分：${r.rating}/5

【${v.label}】材料組成（總重 ${v.totalWeight}g）：
${(v.ingredients||[]).map(i=>`・${i.name} ${i.amount}${i.unit}`).join('\n')}

試聞評語：${v.comments.map(c=>c.tester+'：'+c.text).join('；')||'無'}
製作筆記：${v.notes||'無'}

請幫我分析這支配方可能的問題，並建議改進方向。`;
  return `https://claude.ai/new?q=${encodeURIComponent(msg)}`;
}

// ══════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════
function updateNav() {
  const back   = document.getElementById('nav-back');
  const newBtn = document.getElementById('nav-new');
  const subBar = document.getElementById('nav-sub-bar');
  const subTitle = document.getElementById('nav-sub-title');
  const subAction = document.getElementById('nav-sub-action');
  const mainEl = document.querySelector('main');

  // sub-bar 顯示條件：非 home/mat/notes 頁
  const isHome = (S.screen === 'home') || currentTab === 'mat' || currentTab === 'notes';
  if (subBar) subBar.style.display = isHome ? 'none' : 'flex';
  if (back) back.style.display = isHome ? 'none' : 'flex';
  if (mainEl) mainEl.style.paddingTop = isHome ? 'var(--nav-h)' : 'calc(var(--nav-h) + 44px)';

  if (S.screen === 'category') {
    const cat = CAT_MAP[S.catId];
    if (subTitle) subTitle.textContent = cat ? cat.name : '';
    if (subAction) { subAction.textContent = '＋ 新增'; subAction.style.display=''; subAction.onclick=navAction; }
  } else if (S.screen === 'detail') {
    const r = S.recipes.find(x=>x.id===S.recipeId);
    if (subTitle) subTitle.textContent = r ? r.name : '';
    if (subAction) { subAction.textContent = '編輯'; subAction.style.display=''; subAction.onclick=()=>goForm(S.recipeId); }
  } else if (S.screen === 'form') {
    if (subTitle) subTitle.textContent = S.editData?.id ? '編輯配方' : '新增配方';
    if (subAction) { subAction.textContent = '儲存'; subAction.style.display=''; subAction.className='nav-sub-save'; subAction.onclick=saveForm; }
  }
}
function navBack() {
  if (S.screen==='form') {
    if (!confirm('尚未儲存，確定離開？')) return;
    S.editData=null; S.screen=S.recipeId?'detail':'category';
  }
  else if (S.screen==='detail') { S.screen='category'; }
  else if (S.screen==='category') { S.screen='home'; }
  render();
}
function navAction() {
  if (S.screen==='home'||S.screen==='category') goForm(null);
}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function goCat(catId) {
  if (touchDragging) return;
  S.screen='category'; S.catId=catId; render();
}
function goDetail(id)  { S.screen='detail'; S.recipeId=id; render(); }
function goForm(id) {
  if (id) {
    const r = S.recipes.find(x=>x.id===id);
    S.editData = JSON.parse(JSON.stringify(r));
  } else {
    // 自動計算下一個編號
    const usedNums = S.recipes.filter(r=>!r.num.startsWith('客')).map(r=>parseInt(r.num)).filter(n=>!isNaN(n));
    const nextNum = usedNums.length > 0 ? Math.max(...usedNums) + 1 : 1;
    S.editData = {
      id:null, num:String(nextNum).padStart(2,'0'), name:'', fragCat:S.catId||'test',
      status:'progress', rating:0, tags:[],
      process:{tincture:false,ferment:false,wine:false,notes:''},
      timeline:{makeDate:'',dryDays:5,agingStart:'',agingNotes:''},
      versions:[{label:'主版',totalWeight:20,ingredients:[{cat:'base',name:'',amount:0,unit:'g'}],notes:'',comments:[]}],
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };
    S.vi[null] = 0;
  }
  S.screen='form'; render();
}

// ══════════════════════════════════════════
//  RENDER: HOME
// ══════════════════════════════════════════
function renderHome() {
  const q = (S.search||'').trim();
  let filteredRecipes = [];
  if (q) {
    filteredRecipes = S.recipes.filter(r=>
      r.name.includes(q)||r.tags.some(t=>t.includes(q))||
      r.versions.some(v=>v.ingredients.some(i=>i.name.includes(q)))
    );
  }
  // 套用自定義排序
  const orderedCats = S.catOrder
    ? S.catOrder.map(id=>CATS.find(c=>c.id===id)).filter(Boolean)
    : CATS;
  const catCards = orderedCats.map(cat => {
    const count = S.recipes.filter(r=>r.fragCat===cat.id).length;
    const img = S.catImages[cat.id];
    return `
    <div class="cat-card" draggable="true" data-catid="${cat.id}"
      onclick="goCat('${cat.id}')"
      ontouchstart="dragTouchStart(event,this)" ontouchmove="dragTouchMove(event)" ontouchend="dragTouchEnd(event)">
      <div class="cat-img-wrap">
        ${img ? `<img src="${img}" alt="${esc(cat.name)}">` : `<div class="cat-img-placeholder"><div class="ph-icon" style="font-size:22px;opacity:0.25;font-family:var(--serif);">香</div><div class="ph-text">點擊上傳圖片</div></div>`}
        <div class="cat-img-upload-btn" onclick="event.stopPropagation();uploadCatImg('${cat.id}')">📷</div>
      </div>
      <div class="cat-info">
        <div class="cat-name"><span class="cat-dot" style="background:${cat.color}"></span>${esc(cat.name)}</div>
        ${cat.sub?`<div class="cat-sub">${esc(cat.sub)}</div>`:''}
        <div class="cat-count">${count} 支配方</div>
      </div>
    </div>`;
  }).join('');

  const searchResults = q ? `
  <div style="margin-bottom:24px;">
    <div style="font-size:11px;color:var(--ink-3);letter-spacing:0.1em;margin-bottom:12px;">搜尋「${esc(q)}」・${filteredRecipes.length} 筆結果</div>
    <div class="recipe-list">${filteredRecipes.length>0 ? filteredRecipes.map(recipeRow).join('') : `<div class="empty">沒有找到符合的配方<div class="empty-sub">試試其他關鍵字</div></div>`}</div>
  </div>` : '';

  const sortBtn = `<button onclick="matSort=matSort==='stock'?'name':'stock';renderApp();"
    style="flex-shrink:0;padding:8px 14px;border:1px solid var(--border);background:${matSort==='stock'?'var(--ink)':'transparent'};
    color:${matSort==='stock'?'var(--bg)':'var(--ink-3)'};font-size:11px;font-family:var(--sans);font-weight:300;
    letter-spacing:0.1em;cursor:pointer;white-space:nowrap;transition:all 0.2s;">
    ${matSort==='stock'?'庫存↑':'庫存排序'}
  </button>`;

  return `
  <div class="container">
    <div class="home-toolbar">
      <div class="home-search">
        <span class="home-search-icon">⌕</span>
        <input type="text" placeholder="搜尋配方、材料、標籤… (Enter)" value="${esc(S.search)}" id="search-input" autocomplete="off" autocorrect="off" autocapitalize="off" onkeydown="if(event.key==='Enter'){S.search=this.value;render();}">
        ${S.search ? `<button onclick="S.search='';render();" style="padding:0 14px;border:none;background:none;color:var(--ink-4);cursor:pointer;font-size:16px;height:100%;border-left:1px solid var(--border);">×</button>` : ''}
      </div>
      <button class="home-new-btn" onclick="navAction()">+ NEW</button>
    </div>
    ${searchResults}
    <div style="height:1px;background:var(--border);margin-bottom:24px;"></div>
    <div class="cat-grid">${catCards}</div>
  </div>`;
}

// ══════════════════════════════════════════
//  RENDER: CATEGORY
// ══════════════════════════════════════════
function recipeRow(r) {
  const v = r.versions[getVI(r)];
  const allC = r.versions.flatMap(vv=>vv.comments);
  const lastC = allC[allC.length-1];
  const pills = processPills(r.process);
  const statusColors = {success:'var(--success)',fail:'var(--fail)',pending:'var(--pending)',order:'var(--order)',progress:'var(--progress)'};
  const borderCol = statusColors[r.status] || 'var(--progress)';
  return `
  <div class="recipe-row" onclick="goDetail(${r.id})" style="border-left:3px solid ${borderCol};">
    <div class="recipe-row-left">
      <div class="recipe-num">No. ${esc(r.num)}</div>
      <div class="recipe-name-sm">${esc(r.name)}</div>
      <div class="recipe-row-meta">
        ${badge(r.status)}
        ${r.rating>0?renderStars(r.rating):''}
        ${v.totalWeight>0?`<span style="font-size:12px;color:var(--ink-4)">${v.totalWeight}g</span>`:''}
        ${r.versions.length>1?`<span style="font-size:12px;color:var(--ink-4)">${r.versions.length}版本</span>`:''}
        ${pills}
      </div>
    </div>
    <div class="recipe-row-right">
      ${lastC?`<div class="recipe-comment-sm">${esc(lastC.tester)}：${esc(lastC.text)}</div>`:''}
      ${r.tags.slice(0,2).map(t=>`<span class="tag-sm">${esc(t)}</span>`).join('')}
    </div>
  </div>`;
}

let catSort = 'status'; // 'status' | 'rating' | 'name'
function renderCategory() {
  const cat = CAT_MAP[S.catId];
  let recipes = S.recipes.filter(r=>r.fragCat===S.catId);
  // 分類內搜尋
  const cq = (S._catSearch||'').trim();
  if (cq) {
    recipes = recipes.filter(r=>
      r.name.includes(cq)||r.tags.some(t=>t.includes(cq))||
      r.versions.some(v=>v.ingredients.some(i=>i.name.includes(cq)))
    );
  }
  // 排序
  if (catSort==='rating') recipes.sort((a,b)=>b.rating-a.rating);
  else if (catSort==='name') recipes.sort((a,b)=>a.name.localeCompare(b.name,'zh'));

  const grouped = {
    success: recipes.filter(r=>r.status==='success'||r.status==='order'),
    progress: recipes.filter(r=>r.status==='progress'||r.status==='pending'),
    fail: recipes.filter(r=>r.status==='fail'),
  };
  const section = (label, rs) => rs.length===0?'':`
  <div style="margin-bottom:24px;">
    <div class="cat-section-lbl">${label}</div>
    <div class="recipe-list">${rs.map(recipeRow).join('')}</div>
  </div>`;
  const img = S.catImages[S.catId];
  const sortBtns = ['status','rating','name'].map(k=>{
    const labels={status:'狀態',rating:'評分',name:'名稱'};
    return `<button onclick="catSort='${k}';render()" style="padding:4px 10px;font-size:11px;border:1px solid ${catSort===k?'var(--ink)':'var(--border)'};background:${catSort===k?'var(--ink)':'transparent'};color:${catSort===k?'var(--bg)':'var(--ink-3)'};cursor:pointer;font-family:var(--sans);font-weight:300;letter-spacing:0.06em;transition:all 0.2s;margin-right:-1px;">${labels[k]}</button>`;
  }).join('');
  const sortBtn = `<button onclick="matSort=matSort==='stock'?'name':'stock';renderApp();"
    style="flex-shrink:0;padding:8px 14px;border:1px solid var(--border);background:${matSort==='stock'?'var(--ink)':'transparent'};
    color:${matSort==='stock'?'var(--bg)':'var(--ink-3)'};font-size:11px;font-family:var(--sans);font-weight:300;
    letter-spacing:0.1em;cursor:pointer;white-space:nowrap;transition:all 0.2s;">
    ${matSort==='stock'?'庫存↑':'庫存排序'}
  </button>`;

  return `
  <div class="container">
    ${img?`<div style="width:100%;max-height:200px;overflow:hidden;margin-bottom:24px;"><img src="${img}" style="width:100%;height:200px;object-fit:cover;display:block;"></div>`:''}
    <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:16px;">
      <div style="font-family:var(--serif);font-size:22px;font-weight:300;letter-spacing:0.12em;">${cat?cat.name:''}</div>
      ${cat&&cat.sub?`<div style="font-size:13px;color:var(--ink-3);letter-spacing:0.05em;">${cat.sub}</div>`:''}
      <div style="font-size:11px;color:var(--ink-4);margin-left:auto;">${recipes.length} 支配方</div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;">
      <div class="home-search" style="flex:1;min-width:180px;height:36px;">
        <span style="padding:0 10px;color:var(--ink-3);font-size:14px;">⌕</span>
        <input type="text" placeholder="在此分類中搜尋…" value="${esc(cq)}" style="flex:1;padding:0 8px;border:none;background:none;font-size:13px;font-family:var(--sans);font-weight:300;color:var(--ink);outline:none;height:100%;"
          oninput="S._catSearch=this.value;render();" onkeydown="if(event.key==='Enter'){render();}">
        ${cq?`<button onclick="S._catSearch='';render();" style="padding:0 10px;border:none;background:none;color:var(--ink-4);cursor:pointer;font-size:14px;height:100%;">×</button>`:''}
      </div>
      <div style="display:flex;">${sortBtns}</div>
    </div>
    ${recipes.length===0?`<div class="empty">${cq?'沒有符合的配方':'這個分類尚無配方'}<div class="empty-sub">${cq?'試試其他關鍵字':'點擊右上角 ＋ 新增'}</div></div>`:
      catSort==='status'?(section('成功・客訂',grouped.success)+section('進行中・待定',grouped.progress)+section('待改進',grouped.fail)):
      `<div class="recipe-list">${recipes.map(recipeRow).join('')}</div>`}
  </div>`;
}

// ══════════════════════════════════════════
//  RENDER: DETAIL
// ══════════════════════════════════════════
function renderDetail() {
  const r = S.recipes.find(x=>x.id===S.recipeId);
  if (!r) { S.screen='category'; return renderCategory(); }
  const vi = getVI(r);
  const v = r.versions[vi];
  const grouped={};
  ING_CAT_ORDER.forEach(c=>grouped[c]=[]);
  (v.ingredients||[]).forEach(ing=>{
    const c=ing.cat||'botanical';
    if(!grouped[c])grouped[c]=[];
    grouped[c].push(ing);
  });
  const gTot = v.ingredients.filter(i=>i.unit==='g'||i.unit==='%').reduce((s,i)=>s+i.amount,0);
  const ingHTML = ING_CAT_ORDER.filter(c=>grouped[c].length>0).map(c=>{
    const ic=ING_CATS[c]||{label:c,color:'#888'};
    const rows=grouped[c].map(ing=>{
      const pct=(ing.unit==='g'||ing.unit==='%')&&gTot>0?`<span class="ing-pct">${(ing.amount/gTot*100).toFixed(1)}%</span>`:'';
      return `<div class="ing-item"><span class="ing-name">${esc(ing.name)}</span><span class="ing-right">${ing.amount}${ing.unit}${pct}</span></div>`;
    }).join('');
    return `<div class="ing-group">
      <div class="ing-group-label"><span style="background:${ic.color}"></span>${ic.label}</div>
      ${rows}
    </div>`;
  }).join('');
  const t=r.timeline;
  const fmt=d=>{const dt=new Date(d);return dt.getFullYear()+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+String(dt.getDate()).padStart(2,'0');};
  return `
  <div class="detail-wrap">
    <div class="detail-hero">
      <div class="detail-num">No. ${esc(r.num)} · ${r.fragCat&&CAT_MAP[r.fragCat]?CAT_MAP[r.fragCat].name:''}·${r.status==='order'?'客訂':'自製'}</div>
      <div class="detail-name">${esc(r.name)}</div>
      <div class="detail-meta">
        ${badge(r.status)}
        ${r.rating>0?renderStars(r.rating):''}
        ${processPills(r.process)}
      </div>
      ${r.tags.length?`<div class="detail-tags">${r.tags.map(t=>`<span class="tag-sm">${esc(t)}</span>`).join('')}</div>`:''}
    </div>

    ${r.versions.length>1?`<div class="ver-tabs">${r.versions.map((vv,i)=>`<button class="ver-tab${i===vi?' on':''}" onclick="S.vi[${r.id}]=${i};render()">${esc(vv.label)}</button>`).join('')}</div>`:''}

    <div class="section-card">
      <div class="section-lbl">配方組成 · ${esc(v.label)}${v.totalWeight>0?` · 總重 ${v.totalWeight}g`:''}</div>
      ${v.ingredients.length>0?propBar(v.ingredients)+ingHTML:'<div style="color:var(--ink-4);font-size:13px;">尚無配方資料</div>'}
    </div>

    ${r.process.tincture||r.process.ferment||r.process.wine||r.process.notes?`
    <div class="section-card">
      <div class="section-lbl">特殊製程</div>
      <div class="proc-wrap">${processPills(r.process)}</div>
      ${r.process.notes?`<div class="proc-note">${esc(r.process.notes)}</div>`:''}
    </div>`:''}

    ${t&&t.makeDate?`
    <div class="section-card">
      <div class="section-lbl">時間軸</div>
      <div class="tl-row"><span class="tl-label">製作日</span><span class="tl-val">${esc(t.makeDate)}</span><span style="font-size:12px;color:var(--ink-4)">→ 陰乾 ${t.dryDays} 天</span></div>
      ${tlStatus(r)}
      ${t.agingStart?`<div class="tl-row" style="margin-top:8px;"><span class="tl-label">窖藏</span><span class="tl-val">${esc(t.agingStart)} 起</span></div>`:''}
      ${t.agingNotes?`<div style="font-size:12px;color:var(--ink-2);margin-top:4px;">${esc(t.agingNotes)}</div>`:''}
    </div>`:''}

    ${v.notes?`
    <div class="section-card">
      <div class="section-lbl">製作筆記</div>
      <p style="font-size:13px;color:var(--ink);line-height:1.8;font-family:var(--serif);">${esc(v.notes)}</p>
    </div>`:''}

    ${v.comments&&v.comments.length>0?`
    <div class="section-card">
      <div class="section-lbl">試聞評語</div>
      ${v.comments.map(c=>`<div class="cmt-item">
        <div class="cmt-avatar">${esc(c.tester.slice(0,2))}</div>
        <div><div class="cmt-tester">${esc(c.tester)}</div><div class="cmt-text">「${esc(c.text)}」</div></div>
      </div>`).join('')}
    </div>`:''}

    <a class="claude-btn" href="${claudeURL(r)}" target="_blank" rel="noopener">
      <span class="claude-btn-icon">◈</span>用 Claude 討論這支配方
    </a>

    <button onclick="deleteRecipe(${r.id})" style="width:100%;margin-top:8px;padding:12px 20px;background:transparent;border:1px solid var(--fail-b);cursor:pointer;font-family:var(--sans);font-size:12px;color:var(--fail);letter-spacing:0.1em;transition:all 0.2s;"
      onmouseover="this.style.background='var(--fail-bg)'" onmouseout="this.style.background='transparent'">刪除此配方</button>

  </div>`;
}

// ══════════════════════════════════════════
//  RENDER: FORM
// ══════════════════════════════════════════
function renderForm() {
  const r = S.editData;
  const vi = Math.min(S.vi[r.id||'new']||0, r.versions.length-1);
  const v = r.versions[vi];
  const tagHtml = r.tags.map(t=>`<span class="tag-rm">${esc(t)}<span class="tag-x" onclick="rmTag('${esc(t)}')">×</span></span>`).join('');
  // 建立材料名稱建議清單
  const allMatNames = [...new Set([...getMaterials().map(m=>m.name), ...S.recipes.flatMap(rx=>rx.versions.flatMap(vv=>vv.ingredients.map(ig=>ig.name)))])].filter(Boolean);
  const datalistHtml = `<datalist id="mat-suggestions">${allMatNames.map(n=>`<option value="${esc(n)}">`).join('')}</datalist>`;
  const ingRows = (v.ingredients||[]).map((ing,idx)=>`
    <div class="ing-form-row">
      <input class="fi" value="${esc(ing.name)}" placeholder="材料名稱" list="mat-suggestions" oninput="fIng(${idx},'name',this.value)">
      <input class="fi" type="number" step="0.1" value="${ing.amount}" oninput="fIng(${idx},'amount',parseFloat(this.value)||0)">
      <select class="fi" onchange="fIng(${idx},'unit',this.value)">
        ${['g','d','%','ml'].map(u=>`<option${ing.unit===u?' selected':''}>${u}</option>`).join('')}
      </select>
      <button class="rm-btn" onclick="rmIng(${idx})">×</button>
    </div>
    <div class="cat-sel"><select class="fi" onchange="fIng(${idx},'cat',this.value)">
      ${ING_CAT_ORDER.map(c=>`<option value="${c}"${ing.cat===c?' selected':''}>${ING_CATS[c]?.label||c}</option>`).join('')}
    </select></div>`).join('');
  const cmtRows = (v.comments||[]).map((c,idx)=>`
    <div style="display:flex;gap:5px;margin-bottom:6px;align-items:center;">
      <input class="fi" style="width:65px" value="${esc(c.tester)}" placeholder="誰" oninput="fCmt(${idx},'tester',this.value)">
      <input class="fi" style="flex:1" value="${esc(c.text)}" placeholder="評語…" oninput="fCmt(${idx},'text',this.value)">
      <button class="rm-btn" onclick="rmCmt(${idx})">×</button>
    </div>`).join('');

  return `
  ${datalistHtml}
  <div class="form-wrap">
    <div class="form-card">
      <div style="font-size:11px;letter-spacing:0.16em;color:var(--ink-3);text-transform:uppercase;margin-bottom:16px;">基本資訊</div>
      <div class="form-grid2" style="margin-bottom:12px;">
        <div class="form-group"><label class="form-lbl">編號</label><input class="fi" id="f-num" value="${esc(r.num)}" placeholder="01"></div>
        <div class="form-group"><label class="form-lbl">分類</label>
          <select class="fi" id="f-fragcat">
            ${CATS.map(c=>`<option value="${c.id}"${r.fragCat===c.id?' selected':''}>${c.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-lbl">配方名稱</label><input class="fi" id="f-name" value="${esc(r.name)}" placeholder="配方名稱"></div>
      <div class="form-grid2">

//  FORM ACTIONS
// ══════════════════════════════════════════
function fVI() { return Math.min(S.vi[S.editData.id||'new']||0, S.editData.versions.length-1); }
function fV()  { return S.editData.versions[fVI()]; }
function fIng(idx,k,v){ fV().ingredients[idx][k]=v; }
function fCmt(idx,k,v){ fV().comments[idx][k]=v; }
function fVerLabel(v){ fV().label=v; }
function fTotalW(v){ fV().totalWeight=v; }
function fSetVI(i){ S.vi[S.editData.id||'new']=i; render(); }
function addVer(){ const r=S.editData; r.versions.push({label:'v'+(r.versions.length+1),totalWeight:20,ingredients:[],notes:'',comments:[]}); S.vi[r.id||'new']=r.versions.length-1; render(); }
function addIng(){ const ings=fV().ingredients; const lastCat=ings.length>0?ings[ings.length-1].cat:'base'; ings.push({cat:lastCat,name:'',amount:0,unit:'g'}); render(); }
function rmIng(idx){ fV().ingredients.splice(idx,1); render(); }
function addCmt(){ fV().comments.push({tester:'',text:''}); render(); }
function rmCmt(idx){ fV().comments.splice(idx,1); render(); }
function toggleProc(k){ S.editData.process[k]=!S.editData.process[k]; render(); }
function setDry(d){ S.editData.timeline.dryDays=d; render(); }

function addTag(){
  const inp=document.getElementById('tag-in'); if(!inp)return;
  const v=inp.value.trim();
  if(v&&!S.editData.tags.includes(v)){S.editData.tags.push(v);}
  inp.value='';
  const el=document.getElementById('tag-list');
  if(el)el.innerHTML=S.editData.tags.map(t=>`<span class="tag-rm">${esc(t)}<span class="tag-x" onclick="rmTag('${esc(t)}')">×</span></span>`).join('');
}
function rmTag(t){
  S.editData.tags=S.editData.tags.filter(x=>x!==t);
  const el=document.getElementById('tag-list');
  if(el)el.innerHTML=S.editData.tags.map(t=>`<span class="tag-rm">${esc(t)}<span class="tag-x" onclick="rmTag('${esc(t)}')">×</span></span>`).join('');
}

function saveForm(){
  const r=S.editData;
  r.num=document.getElementById('f-num')?.value||r.num;
  r.name=document.getElementById('f-name')?.value||r.name;
  r.fragCat=document.getElementById('f-fragcat')?.value||r.fragCat;
  r.status=document.getElementById('f-status')?.value||r.status;
  r.process.notes=document.getElementById('f-proc-notes')?.value||'';
  r.timeline.makeDate=document.getElementById('f-makedate')?.value||'';
  r.timeline.agingStart=document.getElementById('f-aging')?.value||'';
  r.timeline.agingNotes=document.getElementById('f-aging-notes')?.value||'';
  const v=fV();
  v.label=document.getElementById('f-verlabel')?.value||v.label;
  v.totalWeight=parseFloat(document.getElementById('f-totalw')?.value)||0;
  v.notes=document.getElementById('f-notes')?.value||'';
  r.updatedAt = new Date().toISOString();
  if(r.id){ S.recipes=S.recipes.map(x=>x.id===r.id?r:x); S.recipeId=r.id; }
  else{ r.id=S.nextId++; if(!r.createdAt) r.createdAt=r.updatedAt; S.recipes.push(r); S.recipeId=r.id; S.catId=r.fragCat; }
  S.screen='detail'; S.editData=null; save(); render();
}

// ══════════════════════════════════════════
//  CATEGORY IMAGE UPLOAD
// ══════════════════════════════════════════
function uploadCatImg(catId){
  S.pendingCatImg=catId;
  document.getElementById('cat-img-input').click();
}
document.getElementById('cat-img-input').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file||!S.pendingCatImg) return;
  // 壓縮圖片再存（避免 Firestore 文件過大）
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=600;
      let w=img.width, h=img.height;
      if(w>MAX||h>MAX){ const s=MAX/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      S.catImages[S.pendingCatImg]=c.toDataURL('image/jpeg',0.7);
      S.pendingCatImg=null; saveCatImages(); render();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
});

// ══════════════════════════════════════════
//  STARS EDIT (after render)
// ══════════════════════════════════════════
function bindStars(){
  const el=document.getElementById('se'); if(!el)return;
  el.addEventListener('click',e=>{
    const v=parseInt(e.target.dataset.v); if(!v)return;
    S.editData.rating=v;
    el.querySelectorAll('.star-edit').forEach((s,i)=>s.className='star-edit'+(i<v?' on':''));
  });
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
let _lastScreen = 'home';
function render(){
  const app=document.getElementById('app');
  if(S.screen==='home')     app.innerHTML=renderHome();
  else if(S.screen==='category') app.innerHTML=renderCategory();
  else if(S.screen==='detail')   app.innerHTML=renderDetail();
  else if(S.screen==='form')     app.innerHTML=renderForm();
  updateNav();
  bindStars();
  if(S.screen==='home') {
    initDragEvents();
    const si = document.getElementById('search-input');
    if(si && document.activeElement !== si) si.value = S.search;
  }
  if(_lastScreen !== S.screen) { window.scrollTo(0,0); _lastScreen = S.screen; }
}

function deleteRecipe(id) {
  const r = S.recipes.find(x=>x.id===id);
  if (!r) return;
  if (!confirm(`確定刪除「${r.name}」？\n此操作無法復原。`)) return;
  S.recipes = S.recipes.filter(x=>x.id!==id);
  save();
  S.screen = 'category';
  S.recipeId = null;
  render();
}

function deleteVer(idx) {
  if (!S.editData || S.editData.versions.length <= 1) return;
  const label = S.editData.versions[idx].label;
  if (!confirm(`確定刪除版本「${label}」？`)) return;
  S.editData.versions.splice(idx, 1);
  const key = S.editData.id || 'new';
  if ((S.vi[key]||0) >= S.editData.versions.length) S.vi[key] = S.editData.versions.length - 1;
  render();
}

let _lpTimer = null;
function matBindLongPress() {
  document.querySelectorAll('[data-longpress-id]').forEach(el => {
    const id = el.dataset.longpressId;
    // touch
    el.addEventListener('touchstart', () => {
      _lpTimer = setTimeout(() => matLongPressConfirm(id), 800);
    }, {passive:true});
    el.addEventListener('touchend', () => clearTimeout(_lpTimer), {passive:true});
    el.addEventListener('touchmove', () => clearTimeout(_lpTimer), {passive:true});
    // mouse (desktop: right-click already handled, add long mousedown)
    el.addEventListener('mousedown', (e) => {
      if(e.button !== 0) return;
      _lpTimer = setTimeout(() => matLongPressConfirm(id), 800);
    });
    el.addEventListener('mouseup', () => clearTimeout(_lpTimer));
    el.addEventListener('mouseleave', () => clearTimeout(_lpTimer));
  });
}
function matLongPressConfirm(id) {
  clearTimeout(_lpTimer);
  if (confirm('確定要刪除這筆材料嗎？')) {
    let mats = getMaterials().filter(m => m.id !== id);
    saveMaterials(mats);
    renderApp();
  }
}

function loadMaterials() {
  // 從快取讀取（已在 loadFromFirestore 時載入）
  return S._materials || makeMaterialsSeed();
}
function saveMaterials(mats) {
  S._materials = mats;
  const ref = getDocRef('materials');
  if (!ref) return;
  ref.set({ items: mats, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
    .catch(e => console.error('save materials err:', e));
}
function saveNotes(notes) {
  S._notes = notes;
  const ref = getDocRef('notes');
  if (!ref) return;
  ref.set({ items: notes, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
    .catch(e => console.error('save notes err:', e));
}
function getMaterials() {
  if (!S._materials) S._materials = loadMaterials();
  return S._materials;
}

    if (mo < 3)       { label = '發酵中 · '+days+'天'; bc = '#955254'; }
    else if (mo < 5)  { label = '熟成中 · '+days+'天'; bc = '#a08848'; }
    else if (mo < 12) { label = '可製香 · '+days+'天'; bc = '#6e8c6a'; }
    else              { label = '陳年   · '+days+'天'; bc = '#478675'; }
    return `<span style="display:inline-block;font-size:10px;padding:2px 8px;border:1px solid ${bc};color:${bc};letter-spacing:0.08em;white-space:nowrap;margin-top:4px;">${label}</span>`;

        return `<div class="mat-card">
          <div class="mat-accent" style="background:${col};"></div>
          <div style="flex:1;padding:14px 18px;min-width:0;">
            <div style="font-family:var(--serif);font-size:15px;font-weight:400;color:var(--ink);letter-spacing:0.04em;margin-bottom:6px;">${esc(m.name)}</div>

            </div>
            ${badge}
            <hr class="mat-note-divider"><textarea
              style="width:100%;border:none;background:transparent;font-size:12px;font-family:var(--sans);font-weight:300;color:var(--ink-2);line-height:1.65;resize:none;outline:none;padding:0;min-height:28px;display:block;"
              rows="2" placeholder="試燒備注…"
              onchange="matUpdateNote('${m.id}',this.value)">${esc(m.note||'')}</textarea>
          </div>
          <div style="flex-shrink:0;width:96px;padding:12px 10px;border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:stretch;justify-content:center;gap:6px;">
            <div style="font-size:10px;color:var(--ink-4);letter-spacing:0.12em;text-align:center;margin-bottom:2px;">庫存</div>
            <div class="mat-stock-wrap">
              <input class="mat-si" type="number" min="0" value="${sq}" placeholder="0" style="width:52px;flex:1;text-align:center;-webkit-appearance:none;"
                onchange="matUpdateStock('${m.id}','qty',+this.value)">
              <select class="mat-unit" style="width:40px;" onchange="matUpdateStock('${m.id}','unit',this.value)">${unitOpts}</select>
            </div>
            <div style="font-size:11px;letter-spacing:0.06em;text-align:center;color:${sq>0?'var(--ink-3)':'var(--fail)'};">${sq>0?su:'缺貨'}</div>
          </div>
        </div>`;
      }).join('');

  const addForm = matAddMode ? `

      </div>

  const sortBtn = `<button onclick="matSort=matSort==='stock'?'name':'stock';renderApp();"
    style="flex-shrink:0;padding:8px 14px;border:1px solid var(--border);background:${matSort==='stock'?'var(--ink)':'transparent'};
    color:${matSort==='stock'?'var(--bg)':'var(--ink-3)'};font-size:11px;font-family:var(--sans);font-weight:300;

  return `

function matSetCat(cat) { matCatFilter = cat; matAddMode = false; newMat = {cat,name:'',origin:'',supplier:'',note:'',stock:''}; renderApp(); }
function matStartAdd() { matAddMode = true; newMat = {cat:matCatFilter,name:'',origin:'',supplier:'',note:'',stock:''}; renderApp(); }
function matConfirmAdd() {
  if (!newMat.name.trim()) return;
  const mats = getMaterials();
  newMat.id = 'mu' + Date.now();
  const matToAdd = {...newMat, stock:{qty:newMat.stockQty||0, unit:newMat.stockUnit||'g', note:''}};
  delete matToAdd.stockQty; delete matToAdd.stockUnit;
  mats.push(matToAdd);
  saveMaterials(mats);
  matAddMode = false;
  newMat = {cat:matCatFilter,name:'',origin:'',supplier:'',note:'',stockQty:0,stockUnit:'g'};
  renderApp();
}
function matDelete(id) {
  if (!confirm('確定刪除這筆材料？')) return;
  let mats = getMaterials().filter(m=>m.id!==id);
  saveMaterials(mats);
  renderApp();
}
function matUpdateStock(id, field, val) {
  const mats = getMaterials();
  const m = mats.find(x=>x.id===id);
  if (!m) return;
  // migration: 舊字串格式 → 結構
  if (typeof m.stock !== 'object' || m.stock === null) {
    m.stock = {qty:0, unit:'g', note: typeof m.stock==='string' ? m.stock : ''};
  }
  m.stock[field] = val;
  saveMaterials(mats);
}
function matUpdateNote(id, val) {
  const mats = getMaterials();
  const m = mats.find(x=>x.id===id);
  if (m) { m.note = val; saveMaterials(mats); }
}

  if (currentTab === 'notes') {
    app.innerHTML = renderNotes();
    updateNav();
    return;
  }
  render();
}

function exportData() {
  const now = new Date();
  const ts = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const data = {
    exportedAt: now.toISOString(),
    recipes: S.recipes,
    nextId: S.nextId,
    catImages: S.catImages,
    catOrder: S.catOrder,
    materials: getMaterials(),
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'SINUS_NOTE_backup_' + ts + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.recipes || !Array.isArray(data.recipes)) { alert('備份檔格式錯誤'); return; }
        if (!confirm(`確定匯入備份嗎？\n（${data.recipes.length} 支配方，匯出於 ${data.exportedAt||'未知'}）\n\n⚠ 這會覆蓋目前所有資料`)) return;
        S.recipes = data.recipes;
        S.nextId = data.nextId || 200;
        if (data.catImages && typeof data.catImages === 'object') { S.catImages = data.catImages; saveCatImages(); }
        if (data.catOrder) S.catOrder = data.catOrder;
        if (data.materials && Array.isArray(data.materials)) { saveMaterials(data.materials); }
        save();
        S.screen = 'home'; currentTab = 'home';
        render(); updateBottomNav('home');
        alert('匯入完成！');
      } catch(err) { alert('匯入失敗：' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// 合併匯入：只新增，不覆蓋現有資料
function mergeImportData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.recipes && !data.materials) { alert('檔案格式錯誤：需要包含 recipes 或 materials'); return; }
        const newRecipes = Array.isArray(data.recipes) ? data.recipes : [];
        const newMats = Array.isArray(data.materials) ? data.materials : [];

        // 配方：跳過同名已存在的
        const existingNames = new Set(S.recipes.map(r => r.name));
        let addedR = 0;
        newRecipes.forEach(r => {
          if (!r.name || existingNames.has(r.name)) return;
          r.id = S.nextId++;
          S.recipes.push(r);
          addedR++;
        });

        // 材料：跳過同名同類已存在的
        const existingMats = getMaterials();
        const existingMatKeys = new Set(existingMats.map(m => m.cat + '|' + m.name));
        let addedM = 0;
        newMats.forEach(m => {
          if (!m.name || existingMatKeys.has(m.cat + '|' + m.name)) return;
          m.id = 'mu' + Date.now() + addedM;
          existingMats.push(m);
          addedM++;
        });

        if (addedM > 0) saveMaterials(existingMats);
        if (addedR > 0 || addedM > 0) {
          save();
          render();
          alert(`合併完成！\n新增配方 ${addedR} 支，新增材料 ${addedM} 筆`);
        } else {
          alert('沒有新資料需要新增（已全部存在）');
        }
      } catch(err) { alert('合併失敗：' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

let dragSrcId = null;
let touchDragId = null;
let touchLongTimer = null;
let touchDragging = false;
let ghostEl = null;

function initDragEvents() {
  const grid = document.querySelector('.cat-grid');
  if (!grid) return;
  grid.addEventListener('dragstart', e => {
    const card = e.target.closest('[data-catid]');
    if (!card) return;
    dragSrcId = card.dataset.catid;
    card.style.opacity = '0.4';
    e.dataTransfer.effectAllowed = 'move';
  });
  grid.addEventListener('dragend', e => {
    const card = e.target.closest('[data-catid]');
    if (card) card.style.opacity = '';
    dragSrcId = null;
  });
  grid.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const card = e.target.closest('[data-catid]');
    if (card && card.dataset.catid !== dragSrcId) {
      card.style.borderColor = 'var(--accent)';
    }
  });
  grid.addEventListener('dragleave', e => {
    const card = e.target.closest('[data-catid]');
    if (card) card.style.borderColor = '';
  });
  grid.addEventListener('drop', e => {
    e.preventDefault();
    const card = e.target.closest('[data-catid]');
    if (!card || !dragSrcId || card.dataset.catid === dragSrcId) return;
    card.style.borderColor = '';
    const order = S.catOrder ? [...S.catOrder] : CATS.map(c=>c.id);
    const from = order.indexOf(dragSrcId);
    const to   = order.indexOf(card.dataset.catid);
    if (from < 0 || to < 0) return;
    order.splice(to, 0, order.splice(from, 1)[0]);
    S.catOrder = order;
    save(); render();
  });
}

// Touch: 長按 600ms 觸發拖曳
function dragTouchStart(e, el) {
  touchLongTimer = setTimeout(() => {
    touchDragging = true;
    touchDragId = el.dataset.catid;
    el.style.opacity = '0.45';
    el.style.transform = 'scale(1.02)';
    // 防止點擊觸發 goCat
    el.dataset.dragged = '1';
  }, 600);
}
function dragTouchMove(e) {
  if (!touchDragging) { clearTimeout(touchLongTimer); return; }
  e.preventDefault();
  const touch = e.touches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const card = el ? el.closest('[data-catid]') : null;
  // highlight
  document.querySelectorAll('.cat-card').forEach(c => c.style.borderColor = '');
  if (card && card.dataset.catid !== touchDragId) card.style.borderColor = 'var(--accent)';
}
function dragTouchEnd(e) {
  clearTimeout(touchLongTimer);
  if (!touchDragging) return;
  e.preventDefault();
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const card = el ? el.closest('[data-catid]') : null;
  document.querySelectorAll('.cat-card').forEach(c => { c.style.opacity=''; c.style.borderColor=''; c.style.transform=''; });
  if (card && card.dataset.catid && card.dataset.catid !== touchDragId) {
    const order = S.catOrder ? [...S.catOrder] : CATS.map(c=>c.id);
    const from = order.indexOf(touchDragId);
    const to   = order.indexOf(card.dataset.catid);
    if (from >= 0 && to >= 0) {
      order.splice(to, 0, order.splice(from, 1)[0]);
      S.catOrder = order;
      save();
    }
  }
  touchDragging = false;
  touchDragId = null;
  render();
}

// ── 日期格式化 ──
function formatNoteDate(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}  ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ── 語音錄音（整合在 notes textarea）──
function toggleNotesRecording() {
  if (notesRecording) stopNotesRecording();
  else startNotesRecording();
}

function startNotesRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const statusEl = document.getElementById('notes-rec-status');
  if (!SR) {
    if (statusEl) statusEl.textContent = '此瀏覽器不支援語音，請用 Chrome 或直接輸入文字';
    return;
  }
  notesTranscript = (document.getElementById('notes-input')?.value || '');
  notesRecognition = new SR();
  notesRecognition.lang = 'zh-TW';
  notesRecognition.continuous = true;
  notesRecognition.interimResults = true;

  notesRecognition.onstart = () => {
    notesRecording = true;
    const btn = document.getElementById('notes-mic-btn');
    if (btn) { btn.classList.add('recording'); btn.innerHTML = STOP_SVG + '<span>停止</span>'; }
    if (statusEl) statusEl.textContent = '錄音中… 說完請再點一次麥克風';
  };
  notesRecognition.onresult = (e) => {
    let interim = '', finals = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finals += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (finals) notesTranscript += finals;
    const ta = document.getElementById('notes-input');
    if (ta) ta.value = notesTranscript + interim;
  };
  notesRecognition.onerror = (e) => {
    if (statusEl) statusEl.textContent = '錄音失敗：' + e.error;
    stopNotesRecording();
  };
  notesRecognition.onend = () => {
    notesRecording = false;
    const btn = document.getElementById('notes-mic-btn');
    if (btn) { btn.classList.remove('recording'); btn.innerHTML = MIC_SVG + '<span>錄音</span>'; }
    const text = document.getElementById('notes-input')?.value?.trim();
    if (statusEl) statusEl.textContent = text ? '錄音完成，確認內容後按儲存筆記' : '沒有偵測到聲音，請再試或手動輸入';
  };
  notesRecognition.start();
}

function stopNotesRecording() {
  if (notesRecognition) { notesRecognition.stop(); notesRecognition = null; }
  notesRecording = false;
  const btn = document.getElementById('notes-mic-btn');
  if (btn) { btn.classList.remove('recording'); btn.innerHTML = MIC_SVG + '<span>錄音</span>'; }
}

// ── AI 解析（per-note）──
async function parseNoteWithAI(noteId) {
  const note = (S._notes || []).find(n => n.id === noteId);
  if (!note) return;

  const key = localStorage.getItem('sinus_anthropic_key');
  if (!key) {
    const w = document.getElementById('notes-apikey-wrap');
    if (w) { w.style.display = 'block'; w.scrollIntoView({behavior:'smooth'}); }
    return;
  }

  const btn = document.getElementById('parse-btn-' + noteId);
  const resultEl = document.getElementById('note-result-' + noteId);
  if (btn) { btn.textContent = '解析中…'; btn.disabled = true; }
  if (resultEl) resultEl.style.display = 'none';

  const matList = (S._materials||[]).map(m=>`${m.name}(${ING_CATS[m.cat]?.label||m.cat})`).join('、') || '尚無';
  const recipeList = (S.recipes||[]).map(r=>`${r.name}[id:${r.id}]`).join('、') || '尚無';

  const systemPrompt = `你是「SINUS NOTE 引香筆記」助手，分析用戶的筆記，判斷是否要寫入材料庫或配方庫。

材料分類：base=基底木, botanical=花果藥草, resin=樹脂, tincture=酊劑, ferment=酒酵香泥, wine=泡酒香粉, binder=黏粉
庫存單位：g, ml, 包, 瓶, 份, 克
現有材料：${matList}
現有配方：${recipeList}

請分析筆記，回傳以下 JSON 之一（純 JSON，不加 markdown）。若筆記涉及多個操作，選最主要的一個：

新增材料到材料庫：
{"type":"material_add","cat":"botanical","name":"材料名","origin":"","supplier":"","note":"","qty":0,"unit":"g","summary":"新增「XXX」到花果藥草"}

更新材料庫存：
{"type":"stock_update","name":"材料名","qty":50,"unit":"g","summary":"更新「XXX」庫存 50g"}

新增配方（用試燒數據）：
{"type":"recipe_add","name":"配方名稱","fragCat":"floral","ingredients":[{"cat":"base","name":"材料名","amount":9.6,"unit":"g"}],"totalWeight":20,"notes":"筆記原文","summary":"新增配方「XXX」"}

在現有配方新增備注：
{"type":"recipe_note","recipeId":0,"recipeName":"配方名","note":"備注內容","summary":"在「XXX」新增試燒備注"}

僅供參考、不需寫入資料庫：
{"type":"journal","summary":"這是日記備注，不需要寫入資料庫"}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 800,
        system: systemPrompt,
        messages: [{ role: 'user', content: note.text }]
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error?.message || 'API 錯誤 ' + res.status);
    }
    const data = await res.json();
    const raw = data.content[0].text.trim().replace(/^```json\s*/,'').replace(/\s*```$/,'');
    let result;
    try { result = JSON.parse(raw); }
    catch { result = { type: 'journal', summary: '格式解析失敗，原始回應：' + raw.slice(0,80) }; }
    showNoteParseResult(noteId, result);
  } catch(e) {
    if (resultEl) {
      resultEl.style.display = 'block';
      resultEl.innerHTML = `<div style="color:var(--fail);font-size:12px;">解析失敗：${esc(e.message)}</div>`;
    }
  } finally {
    if (btn) { btn.textContent = 'AI 解析'; btn.disabled = false; }
  }
}

function showNoteParseResult(noteId, result) {
  const resultEl = document.getElementById('note-result-' + noteId);
  if (!resultEl) return;
  resultEl.dataset.result = JSON.stringify(result);
  resultEl.style.display = 'block';

  const typeLabel = {
    material_add: '新增材料',
    stock_update: '更新庫存',
    recipe_add: '新增配方',
    recipe_note: '配方備注',
    journal: '日記備注'
  }[result.type] || result.type;

  const isAction = result.type !== 'journal';
  resultEl.innerHTML = `
    <div style="font-size:10px;letter-spacing:0.14em;color:var(--ink-4);margin-bottom:6px;text-transform:uppercase;">${typeLabel}</div>
    <div style="font-size:14px;color:var(--ink);font-family:var(--serif);line-height:1.5;margin-bottom:${isAction?'12px':'0'};">${esc(result.summary||'')}</div>
    ${isAction ? `<div style="display:flex;gap:8px;margin-top:10px;">
      <button onclick="confirmNoteAction('${noteId}')"
        style="flex:1;padding:9px;background:var(--ink);color:var(--bg);border:none;font-family:var(--sans);font-weight:300;font-size:11px;letter-spacing:0.15em;cursor:pointer;">確認儲存</button>
      <button onclick="document.getElementById('note-result-${noteId}').style.display='none'"
        style="padding:9px 14px;background:transparent;border:1px solid var(--border);font-family:var(--sans);font-weight:300;font-size:11px;cursor:pointer;color:var(--ink-2);">取消</button>
    </div>` : ''}`;
}

function confirmNoteAction(noteId) {
  const resultEl = document.getElementById('note-result-' + noteId);
  if (!resultEl) return;
  const r = JSON.parse(resultEl.dataset.result || '{}');

  if (r.type === 'material_add') {
    const mats = getMaterials();
    mats.push({
      id: 'mu' + Date.now(), cat: r.cat || 'botanical',
      name: r.name || '', origin: r.origin || '',
      supplier: r.supplier || '', note: r.note || '',
      stock: { qty: r.qty || 0, unit: r.unit || 'g', note: '' }
    });
    saveMaterials(mats);
    resultEl.style.display = 'none';
    goBottomMat();

  } else if (r.type === 'stock_update') {
    const mats = getMaterials();
    const mat = mats.find(m => m.name.includes(r.name) || r.name.includes(m.name));
    if (mat) {
      mat.stock = { qty: r.qty || 0, unit: r.unit || 'g', note: mat.stock?.note || '' };
      saveMaterials(mats);
      resultEl.style.display = 'none';
      renderApp();
    } else {
      resultEl.innerHTML += `<div style="color:var(--fail);font-size:12px;margin-top:8px;">找不到材料「${esc(r.name)}」，請手動在材料庫新增</div>`;
    }

  } else if (r.type === 'recipe_add') {
    const ings = (r.ingredients || []).map(i => ({ cat: i.cat||'base', name: i.name||'', amount: i.amount||0, unit: i.unit||'g' }));
    const newR = {
      id: S.nextId++,
      num: String(S.nextId).padStart(2,'0'),
      name: r.name || '未命名配方',
      fragCat: r.fragCat || 'test',
      status: 'progress',
      rating: 0, tags: [],
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      process: { tincture:false, ferment:false, wine:false, notes:'' },
      timeline: { makeDate:'', dryDays:0, agingStart:'', agingNotes:'' },
      versions: [{ label:'v1', totalWeight: r.totalWeight||0, ingredients: ings, notes: r.notes||'', comments:[] }]
    };
    S.recipes.push(newR);
    save();
    resultEl.style.display = 'none';
    goBottomHome();
    S.screen = 'detail'; S.recipeId = newR.id; render();

  } else if (r.type === 'recipe_note') {
    const recipe = S.recipes.find(x => x.id === r.recipeId || (r.recipeName && x.name.includes(r.recipeName)));
    if (recipe) {
      const v = recipe.versions[recipe.versions.length - 1];
      if (v) {
        v.comments = v.comments || [];
        v.comments.push({ tester: 'Ryan', text: r.note });
        recipe.updatedAt = new Date().toISOString();
        save();
        resultEl.style.display = 'none';
        renderApp();
      }
    } else {
      resultEl.innerHTML += `<div style="color:var(--fail);font-size:12px;margin-top:8px;">找不到配方「${esc(r.recipeName||'')}」</div>`;
    }
  }
}

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('pw-err');
  const btn = document.getElementById('login-btn');
  if (!email || !pw) { errEl.textContent='請輸入 Email 和密碼'; errEl.style.opacity='1'; return; }
  btn.textContent = '登入中…';
  btn.disabled = true;
  auth.signInWithEmailAndPassword(email, pw)
    .catch(err => {
      const msgs = {'auth/wrong-password':'密碼錯誤','auth/user-not-found':'帳號不存在','auth/invalid-email':'Email 格式錯誤','auth/invalid-credential':'帳號或密碼錯誤','auth/too-many-requests':'嘗試次數過多，請稍後再試'};
      errEl.textContent = msgs[err.code] || '登入失敗：' + err.message;
      errEl.style.opacity = '1';
      btn.textContent = '登入';
      btn.disabled = false;
    });
}

function doLogout() {
  if (!confirm('確定要登出嗎？')) return;
  auth.signOut();
}

auth.onAuthStateChanged(async user => {
  const overlay = document.getElementById('pw-overlay');
  if (user) {
    // 已登入 → 載入資料
    await loadFromFirestore();
    overlay.style.opacity = '0';
    setTimeout(() => overlay.style.display = 'none', 600);
    render();
    updateBottomNav('home');
    setupRealtimeSync();
  } else {
    // 未登入 → 顯示登入畫面
    overlay.style.display = 'flex';
    overlay.style.opacity = '1';
    document.getElementById('app').innerHTML = '';
  }
});
</script>
